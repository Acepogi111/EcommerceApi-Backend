<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List - EcommerceApi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .refresh-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        #productContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.25);
        }
        
        .product-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }
        
        .product-card .price {
            color: #667eea;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .product-card .description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .product-card .meta {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #999;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 50px;
        }
        
        .error {
            background: #ff4757;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .empty {
            text-align: center;
            color: white;
            font-size: 1.3rem;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Product List</h1>
        <button class="refresh-btn" onclick="fetchProducts()">Refresh Products</button>
        
        <main id="productContainer">
            <div class="loading">Loading products...</div>
        </main>
    </div>

   <script>
    // TASK 5: Fetch API Implementation
    const API_URL = 'http://localhost:8080/api/products';
    
    async function fetchProducts() {
        const container = document.getElementById('productContainer');
        container.innerHTML = '<div class="loading">Loading products...</div>';
        
        try {
            console.log('Fetching from:', API_URL);
            const response = await fetch(API_URL);
            
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error('404: Products not found');
                } else if (response.status === 500) {
                    throw new Error('500: Server error');
                } else {
                    throw new Error('HTTP error! status: ' + response.status);
                }
            }
            
            const products = await response.json();
            console.log('Products received:', products);
            
            displayProducts(products);
            
        } catch (error) {
            console.error('Fetch error:', error);
            container.innerHTML = '<div class="error"><strong>Error loading products</strong><br>' + error.message + '<br><small>Check mo kung running yung Spring Boot</small></div>';
        }
    }
    
    function displayProducts(products) {
        const container = document.getElementById('productContainer');
        
        if (!products || products.length === 0) {
            container.innerHTML = '<div class="empty">No products found in database</div>';
            return;
        }
        
        let productsHTML = '';
        for (let i = 0; i < products.length; i++) {
            const product = products[i];
            productsHTML += '<div class="product-card">' +
                '<h3>' + product.name + '</h3>' +
                '<div class="price">$' + parseFloat(product.price).toFixed(2) + '</div>' +
                '<p class="description">' + (product.description || 'No description available') + '</p>' +
                '<div class="meta">' +
                    '<span>Stock: ' + (product.stock || 0) + '</span>' +
                    '<span>ID: ' + product.id + '</span>' +
                '</div>' +
            '</div>';
        }
        
        container.innerHTML = productsHTML;
    }
    
    document.addEventListener('DOMContentLoaded', fetchProducts);
</script>
</body>
</html>
